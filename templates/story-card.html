<!--
  ============================================
  REUSABLE STORY CARD TEMPLATE
  ============================================
  
  Usage:
  Copy the entire <div class="story-card"> block below
  and paste it inside the <div class="story-grid"> container
  in index.html. Change the content as needed.
  
  No other files need to be edited.
  
  ============================================
-->

<!--
<div class="story-card animate-in">
  <div class="story-card__icon">🌟</div>
  <div class="story-card__year">YEAR OR PERIOD</div>
  <h2 class="story-card__title">Story Title Goes Here</h2>
  <p class="story-card__text">
    Story description goes here. Keep it concise — 2-3 sentences
    that capture the essence of this milestone or achievement.
  </p>
  <span class="story-card__tag">Category Tag</span>
</div>
-->

<!--
  FIELDS:
  ─────────────────────────────────────────────
  .story-card__icon    → Emoji or icon (e.g. 📺 🎓 🧘 💛 🌊 🌍)
  .story-card__year    → Year, period, or label (e.g. "2023", "Ongoing")
  .story-card__title   → Short, descriptive title
  .story-card__text    → 2-3 sentence description
  .story-card__tag     → Category badge (e.g. "Innovation", "Karseva")
  ─────────────────────────────────────────────
  
  ADDING A NEW STORY:
  1. Copy the <div class="story-card animate-in"> block above
  2. Paste it before the closing </div> of .story-grid in index.html
  3. Update the 5 content fields
  4. Save — done! The grid auto-adjusts.
-->
